<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vieira Veículos</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec}
header{background:#111;color:#fff;padding:20px;text-align:center}
.container{display:flex;max-width:1400px;margin:auto}
.sidebar{width:280px;background:#fff;padding:20px}
.content{flex:1;padding:20px}
input,select{width:100%;padding:10px;margin:6px 0}
button,.btn{background:#c70000;color:#fff;border:none;padding:12px 16px;cursor:pointer;text-decoration:none;display:inline-block}
.card{background:#fff;margin-bottom:20px;display:grid;grid-template-columns:430px 1fr;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card img{width:100%;height:300px;object-fit:cover}
.info{padding:20px}
.title{font-size:34px;font-weight:bold}
.price{font-size:22px;font-weight:bold;margin:10px 0}
.specs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}
.spec{background:#f1f1f1;padding:12px;text-align:center}
.admin{display:none;background:#fff;padding:15px;margin-bottom:15px}
@media(max-width:900px){
.container{display:block}
.sidebar{width:auto}
.card{grid-template-columns:1fr}
.card img{height:220px}
.specs{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
<h1>VIEIRA VEÍCULOS</h1>
<p>Av. Euvaldo Lodi, 550</p>
</header>

<div class="container">

<div class="sidebar">
<h3>Filtros</h3>
<input id="busca" placeholder="Pesquisar veículo..." onkeyup="render()">

<a class="btn" href="https://wa.me/5534988870150" target="_blank">WhatsApp</a>
<br><br>
<button onclick="login()">Área Administrativa</button>
</div>

<div class="content">

<div class="admin" id="admin">
<h3>Painel Administrativo</h3>
<p><b>Senha inicial:</b> vieira123</p>
<p>Os veículos ficam armazenados no código. Você poderá trocar fotos, preços, anos e descrições facilmente.</p>
</div>

<div id="lista"></div>

</div>
</div>

<script>
const veiculos=[
"Chevrolet Celta","Peugeot","Kia","Ford Fiesta Vermelho","Chevrolet Prisma",
"Volkswagen Gol","Fiat Palio","Chevrolet Agile","Volkswagen Golf","Chevrolet Sport",
"Ford Ka","Volkswagen Saveiro Prata","Citroën C3","Chevrolet Montana Preta",
"Fiat Palio Vermelho","Volkswagen Fusca","Chevrolet Onix","Chevrolet S10 LT"
].map((n,i)=>({
nome:n,
ano:"--",
km:"--",
cor:"--",
cambio:"--",
preco:"R$ A CONSULTAR",
img:"https://picsum.photos/seed/veiculo"+i+"/900/600"
}));

function render(){
let b=document.getElementById('busca').value.toLowerCase();
let html='';
veiculos.filter(v=>v.nome.toLowerCase().includes(b)).forEach(v=>{
html+=`
<div class="card">
<img src="${v.img}">
<div class="info">
<div class="title">${v.nome}</div>
<div class="price">${v.preco}</div>

<div class="specs">
<div class="spec">Ano<br><b>${v.ano}</b></div>
<div class="spec">Km<br><b>${v.km}</b></div>
<div class="spec">Cor<br><b>${v.cor}</b></div>
<div class="spec">Câmbio<br><b>${v.cambio}</b></div>
</div>

<a class="btn" target="_blank"
href="https://wa.me/5534988870150?text=Olá,%20tenho%20interesse%20no%20${encodeURIComponent(v.nome)}">
+ MAIS DETALHES
</a>
</div>
</div>`;
});
document.getElementById('lista').innerHTML=html;
}
render();

function login(){
let s=prompt("Digite a senha");
if(s==="vieira123"){
document.getElementById("admin").style.display="block";
alert("Acesso liberado");
}else{
alert("Senha incorreta");
}
}
</script>

</body>
</html>
